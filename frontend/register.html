<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Register</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Registration</h1>
            <p>Create a new account.</p>
            
            <div id="registerAlert"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary" id="registerBtn">Register</button>
            </form>
            
            <p class="mt-3" style="font-size: 0.875rem;">
                Already have an account? <a href="login.html" style="color: var(--primary);">Login here</a>
            </p>
        </div>
    </div>

    <script>
        // Redirect if already authenticated
        redirectIfAuth();

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.textContent = 'Registering...';
            btn.disabled = true;

            try {
                await api.registerUser({ name, email, password });
                showAlert('registerAlert', 'Registration successful! Redirecting to login...', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } catch (error) {
                showAlert('registerAlert', error.message || 'Registration failed.', 'error');
                btn.textContent = 'Register';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
